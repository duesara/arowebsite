backend:
  name: github
  repo: duesara/aro-website
  branch: main

# Allows users to log in via GitHub OAuth through Netlify Identity
publish_mode: editorial_workflow

# Where uploaded media files get stored in the repo
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  # ─── PORTFOLIO IMAGES ───────────────────────────────────────────────────────
  - name: "portfolio"
    label: "Portfolio"
    label_singular: "Photo"
    folder: "_portfolio"
    create: true
    delete: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    sortable_fields: ["title", "category"]
    view_filters:
      - label: "Portraits"
        field: category
        pattern: "portraits"
      - label: "Weddings"
        field: category
        pattern: "weddings"
      - label: "Events"
        field: category
        pattern: "events"
      - label: "Lifestyle"
        field: category
        pattern: "lifestyle"
    fields:
      - label: "Photo Title"
        name: "title"
        widget: "string"
        hint: "A short evocative title shown on hover (e.g. 'Quiet Strength')"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Portraits", value: "portraits" }
          - { label: "Weddings", value: "weddings" }
          - { label: "Events", value: "events" }
          - { label: "Lifestyle", value: "lifestyle" }

      - label: "Photo"
        name: "image"
        widget: "image"
        hint: "Drag and drop your photo here. JPG or PNG, ideally 1200px wide or larger."
        media_library:
          config:
            multiple: false

      - label: "Alt Text"
        name: "alt"
        widget: "string"
        hint: "Describe the photo for accessibility (e.g. 'Bride laughing during golden hour ceremony')"

      - label: "Show on Home Page"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Turn on to feature this photo on the home page gallery"

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 99
        hint: "Lower numbers appear first in the gallery (1 = first)"

  # ─── SITE SETTINGS ──────────────────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact & Business Info"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - label: "Business Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day(s)", name: "days", widget: "string" }
              - { label: "Hours", name: "hours", widget: "string" }
          - label: "Social Media"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "Pinterest URL", name: "pinterest", widget: "string", required: false }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }

      - label: "Booking & Pricing"
        name: "pricing"
        file: "_data/pricing.json"
        fields:
          - label: "Session Types"
            name: "sessions"
            widget: "list"
            fields:
              - { label: "Session Name", name: "name", widget: "string" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. '$350' or 'From $2,500'" }
              - { label: "Duration", name: "duration", widget: "string", hint: "e.g. '1–2 Hours'" }
              - { label: "Description", name: "description", widget: "text" }
